            'Vendido (Pendiente de Entrega)': 'bg-cyan-500',
            'Vendido': 'bg-blue-500',
            'Enviado a Taller (Garantía)': 'bg-yellow-500',
            'Enviado a Taller (Externo)': 'bg-orange-500',
            'En Taller (Recibido)': 'bg-pink-500',
            'Enviado a Gerencia (Pendiente)': 'bg-indigo-400',
            'Enviado a Gerencia': 'bg-purple-600',
            'Recibido de Taller (OK)': 'bg-teal-500',
            'Entregado al Cliente': 'bg-indigo-500',
            'Reingreso (Tomado como parte de pago)': 'bg-pink-500',
            'De Baja': 'bg-red-500',
        };

        // --- DOM Elements ---
        const loginScreen = document.getElementById('login-screen');
        const appScreen = document.getElementById('app-screen');
        const loadingOverlay = document.getElementById('loading-overlay');

        // --- Utility Functions ---
        const formatCurrency = (amount) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(amount || 0);
        const findPhoneById = (id) => phones.find(p => p.id === id);
        const findClientById = (id) => clients.find(c => c.id === id);
        const findAccessoryById = (id) => accessories.find(a => a.id === id);
        const calculateWorkshopDebt = () => {
            return phones.reduce((total, phone) => {
                const unpaidRepairsCost = (phone.reparaciones || [])
                    .filter(r => !r.paid && r.cost > 0)
                    .reduce((sum, r) => sum + r.cost, 0);
                return total + unpaidRepairsCost;
            }, 0);
        };


        // =================================================================================
        // --- SERVICES (Firebase Communication) ---
        // =================================================================================
        
        async function logStatusChange(phoneId, newStatus, details = null) {
            const phoneRef = doc(db, PHONES_COLLECTION, phoneId);
            const historyEntry = {
                newStatus: newStatus,
                date: new Date(),
                user: auth.currentUser.email,
                details: details || null
            };
            await updateDoc(phoneRef, {
                statusHistory: arrayUnion(historyEntry)
            });
        }

        async function executeSaleTransaction(saleData) {
            const clientRef = doc(db, CLIENTS_COLLECTION, saleData.clientId);

            try {
                await runTransaction(db, async (transaction) => {
                    // --- ALL READS MUST HAPPEN FIRST ---
                    const clientDoc = await transaction.get(clientRef);
                    if (!clientDoc.exists()) throw new Error("Cliente no encontrado.");

                    const clientName = clientDoc.data().name;
                    const currentCredit = clientDoc.data().creditAmount || 0;
                    if (saleData.amountPaidWithCredit > currentCredit) {
                        throw new Error("Crédito insuficiente.");
                    }

                    // --- PREPARE FOR DEBT PAYMENT (if any) ---
                    let debtToPay = saleData.amountPaidWithWorkshopDebt;
                    let pendingRepairsToProcess = [];
                    const phoneDocsToRead = new Map();

                    if (debtToPay > 0) {
                        let allPendingRepairs = [];
                        phones.forEach(phone => {
                            if (phone.reparaciones && phone.reparaciones.length > 0) {
                                phone.reparaciones.forEach((repair, index) => {
                                    if (!repair.paid && repair.cost > 0) {
                                        allPendingRepairs.push({
                                            phoneId: phone.id,
                                            repairIndex: index,
                                            cost: repair.cost,
                                            date: new Date(repair.date)
                                        });
                                    }
                                });
                            }
                        });
                        
                        allPendingRepairs.sort((a, b) => a.date - b.date);
                        
                        for(const repair of allPendingRepairs) {
                            if (debtToPay <= 0) break;
                            if (debtToPay >= repair.cost) {
                                pendingRepairsToProcess.push(repair);
                                debtToPay -= repair.cost;
                            }
                        }

                        const phoneIdsToRead = [...new Set(pendingRepairsToProcess.map(p => p.phoneId))];
                        for (const phoneId of phoneIdsToRead) {
                            const phoneRef = doc(db, PHONES_COLLECTION, phoneId);
                            const phoneDoc = await transaction.get(phoneRef);
                            if (!phoneDoc.exists()) throw new Error(`Phone with ID ${phoneId} for repair payment not found.`);
                            phoneDocsToRead.set(phoneId, phoneDoc.data());
                        }
                    }


                    // --- ALL WRITES HAPPEN AFTER READS ---

                    // 1. Handle credit updates
                    if (saleData.amountPaidWithCredit > 0) {
                        transaction.update(clientRef, { creditAmount: increment(-saleData.amountPaidWithCredit) });
                    }
                    
                    // 2. Handle NEW debt from this transaction
                    if(saleData.debtIncurred > 0) {
                        transaction.update(clientRef, { debtAmount: increment(saleData.debtIncurred) });
                    }


                    // 3. Handle workshop debt payment using the docs we read
                    if (pendingRepairsToProcess.length > 0) {
                        const updatedPhoneRepairs = new Map(); 

                        for (const pending of pendingRepairsToProcess) {
                            const phoneId = pending.phoneId;
                            
                            if (!updatedPhoneRepairs.has(phoneId)) {
                                const originalPhoneData = phoneDocsToRead.get(phoneId);
                                updatedPhoneRepairs.set(phoneId, JSON.parse(JSON.stringify(originalPhoneData.reparaciones || [])));
                            }

                            let currentRepairs = updatedPhoneRepairs.get(phoneId);
                            if (currentRepairs[pending.repairIndex]) {
                                currentRepairs[pending.repairIndex].paid = true;
                            }
                        }

                        updatedPhoneRepairs.forEach((reparaciones, phoneId) => {
                            const phoneRef = doc(db, PHONES_COLLECTION, phoneId);
                            transaction.update(phoneRef, { reparaciones });
                        });
                    }

                    // 4. Create the purchase record
                    const purchaseRef = doc(collection(db, CLIENTS_COLLECTION, saleData.clientId, "purchases"));
                    transaction.set(purchaseRef, { 
                        items: saleData.items,
                        totalAmount: saleData.totalAmount,
                        paymentMethod: saleData.paymentMethod,
                        discountAmount: saleData.discountAmount || 0,
                        debtIncurred: saleData.debtIncurred || 0,
                        amountPaidWithCredit: saleData.amountPaidWithCredit,
                        amountPaidWithWorkshopDebt: saleData.amountPaidWithWorkshopDebt,
                        transferDetails: saleData.transferDetails || null,
                        notes: saleData.notes || null,
                        purchaseDate: serverTimestamp() 
                    });

                    // 5. Update inventory for each item sold
                    for (const item of saleData.items) {
                        if (item.phoneId) {
                            const phoneRef = doc(db, PHONES_COLLECTION, item.phoneId);
                            const historyEntries = [
                                {
                                    newStatus: 'Vendido',
                                    date: new Date(),
                                    user: auth.currentUser.email,
                                    details: `Vendido a ${clientName}`
                                }
                            ];
                            transaction.update(phoneRef, { 
                                estado: 'Vendido', 
                                clienteId: saleData.clientId, 
                                precioVenta: item.price,
                                fechaVenta: new Date().toISOString().slice(0, 10),
                                statusHistory: arrayUnion(...historyEntries)
                            });
                        } else if (item.accessoryId) {
                            const accessoryRef = doc(db, ACCESSORIES_COLLECTION, item.accessoryId);
                            transaction.update(accessoryRef, { cantidad: increment(-item.quantity) });
                        }
                    }
                });
                return { success: true };
            } catch (e) {
                console.error("Transaction failed: ", e);
                return { success: false, error: e.message };
            }
        }
        
        // =================================================================================
        // --- UI MANAGER (DOM Manipulation & Rendering) ---
        // =================================================================================

        const openModal = (modalId) => document.getElementById(modalId).classList.add('modal-active');
        const closeModal = (modalId) => document.getElementById(modalId).classList.remove('modal-active');

        const renderAll = () => {
            const activeTabEl = document.querySelector('.tab-active');
            if (!activeTabEl) return;
            const activeTab = activeTabEl.dataset.tab;
            
            const contentMap = {
                dashboard: renderDashboard,

                apartados: renderApartadosTable,
                inventory: renderInventoryTable,
                vendidos: renderVendidosTable,
                accessories: renderAccessoriesTable,

            };
            
            if (contentMap[activeTab]) {
                contentMap[activeTab]();
            }
            adaptUIToRole(currentUserRole);
        };

        const renderDashboard = () => {
            const container = document.getElementById('dashboard-content');

            if (currentUserRole === 'taller') {
                const pendingReception = phones.filter(p => p.estado === 'Enviado a Taller (Externo)' || p.estado === 'Enviado a Taller (Garantía)').length;
                const inRepair = phones.filter(p => p.estado === 'En Taller (Recibido)').length;
                const pendingManagement = phones.filter(p => p.estado === 'Enviado a Gerencia (Pendiente)').length;
                const totalInProcess = phones.filter(p => p.estado && (p.estado.includes('Taller') || p.estado.includes('Gerencia'))).length;

                container.innerHTML = `
                    <h2 class="text-2xl font-bold text-gray-800 mb-4">Dashboard de Taller</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        <div class="bg-yellow-100 p-6 rounded-xl shadow-md cursor-pointer" data-action="filter-taller" data-filter="pending_reception">
                             <h3 class="text-yellow-800 text-sm font-medium">Pendientes de Recibir</h3>
                             <p class="text-3xl font-bold mt-1 text-yellow-900">${pendingReception}</p>
                        </div>
                        <div class="bg-pink-100 p-6 rounded-xl shadow-md">
                             <h3 class="text-pink-800 text-sm font-medium">Equipos en Reparación</h3>
                             <p class="text-3xl font-bold mt-1 text-pink-900">${inRepair}</p>
                        </div>
                         <div class="bg-indigo-100 p-6 rounded-xl shadow-md cursor-pointer" data-action="filter-taller" data-filter="pending_management_reception">
                             <h3 class="text-indigo-800 text-sm font-medium">Listos para Gerencia</h3>
                             <p class="text-3xl font-bold mt-1 text-indigo-900">${pendingManagement}</p>
                        </div>
                        <div class="bg-gray-200 p-6 rounded-xl shadow-md">
                             <h3 class="text-gray-600 text-sm font-medium">Total en Proceso</h3>
                             <p class="text-3xl font-bold mt-1 text-gray-800">${totalInProcess}</p>
                        </div>
                    </div>
                `;
            } else {
                const soldPhones = phones.filter(p => p.estado && (p.estado.includes('Vendido') || p.estado === 'Pagado'));
                const totalRevenue = soldPhones.reduce((sum, p) => sum + (p.precioVenta || 0), 0);
                const totalProfit = totalRevenue - soldPhones.reduce((sum, p) => sum + (p.costo || 0), 0);

                let roleSpecificCards = '';
                if (currentUserRole === 'admin' || currentUserRole === 'gerente') {
                    const pendingManagementReception = phones.filter(p => p.estado === 'Enviado a Gerencia (Pendiente)').length;
                    const totalPendingPayment = calculateWorkshopDebt();

                    if (pendingManagementReception > 0) {
                        roleSpecificCards += `
                            <div class="bg-indigo-100 p-6 rounded-xl shadow-md cursor-pointer" data-action="filter-taller" data-filter="pending_management_reception">
                                <h3 class="text-indigo-800 text-sm font-medium">Teléfonos Pendientes de Recepción</h3>
                                <p class="text-3xl font-bold mt-1 text-indigo-900">${pendingManagementReception}</p>
                            </div>
                        `;
                    }
                    if (totalPendingPayment > 0) {
                        roleSpecificCards += `
                            <div class="bg-red-100 p-6 rounded-xl shadow-md cursor-pointer" data-action="filter-taller" data-filter="pending_payment">
                                <h3 class="text-red-800 text-sm font-medium">Reparaciones Pendientes de Pago</h3>
                                <p class="text-3xl font-bold mt-1 loss">${formatCurrency(totalPendingPayment)}</p>
                            </div>
                        `;
                    }
                }

                container.innerHTML = `
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        ${roleSpecificCards}
                        <div class="bg-white p-6 rounded-xl shadow-md">
                            <h3 class="text-gray-500 text-sm font-medium">Ganancia Bruta</h3>
                            <p class="text-3xl font-bold mt-1 profit">${formatCurrency(totalProfit)}</p>
                        </div>
                        <div class="bg-white p-6 rounded-xl shadow-md">
                            <h3 class="text-gray-500 text-sm font-medium">Ingresos Totales</h3>
                            <p class="text-3xl font-bold mt-1">${formatCurrency(totalRevenue)}</p>
                        </div>
                        <div class="bg-white p-6 rounded-xl shadow-md">
                            <h3 class="text-gray-500 text-sm font-medium">Disponibles para Venta</h3>
                            <p class="text-3xl font-bold mt-1">${phones.filter(p => p.estado === 'En Stock (Disponible para Venta)').length}</p>
                        </div>
                        <div class="bg-white p-6 rounded-xl shadow-md">
                            <h3 class="text-gray-500 text-sm font-medium">En Taller Externo</h3>
                            <p class="text-3xl font-bold mt-1">${phones.filter(p => p.estado && (p.estado.includes('Taller') || p.estado.includes('Gerencia'))).length}</p>
                        </div>
                    </div>
                `;
            }
        };
        
        const renderFinances = () => {
            const container = document.getElementById('finances-content');
            
            const endDate = new Date();
            const startDate = new Date();
            startDate.setDate(endDate.getDate() - 30);
            
            const defaultStartDate = startDate.toISOString().slice(0, 10);
            const defaultEndDate = endDate.toISOString().slice(0, 10);

            container.innerHTML = `
                <div class="bg-white p-6 rounded-xl shadow-md space-y-6">
                    <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                            <h2 class="text-2xl font-bold text-gray-800">Análisis Financiero</h2>
                            <div class="flex flex-wrap items-center gap-2">
                                <label for="finances-start-date" class="text-sm">Desde:</label>
                                <input type="date" id="finances-start-date" class="p-2 border rounded-lg text-sm" value="${defaultStartDate}">
                                <label for="finances-end-date" class="text-sm">Hasta:</label>
                                <input type="date" id="finances-end-date" class="p-2 border rounded-lg text-sm" value="${defaultEndDate}">
                                <button id="apply-finances-filter" class="bg-blue-500 text-white py-2 px-4 rounded-lg text-sm">Aplicar Filtro</button>
                            </div>
                    </div>
                    <div id="finances-kpis" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                    </div>
                     <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 pt-4 border-t">
                         <div>
                             <h3 class="text-lg font-semibold mb-2">Modelos Más Rentables</h3>
                             <div id="top-models-table" class="overflow-y-auto max-h-96"></div>
                         </div>
                         <div>
                             <h3 class="text-lg font-semibold mb-2">Clientes Más Valiosos</h3>
                             <div id="top-clients-table" class="overflow-y-auto max-h-96"></div>
                         </div>
                     </div>
                </div>
            `;

            document.getElementById('apply-finances-filter').addEventListener('click', updateFinancesDashboard);
            
            updateFinancesDashboard();
        };
